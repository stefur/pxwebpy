name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
      fail-fast: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint
        uses: astral-sh/ruff-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.6"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Nox
        run: uv sync --no-default-groups --locked --group=nox --no-install-project

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: |
          uv run nox -s tests
      
      - name: Build & smoke test
        shell: bash
        run: |
          uv build
          uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
